<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      try {
        if (localStorage.getItem("alloc8-low-gpu") === "1") {
          document.documentElement.setAttribute("data-low-gpu", "1");
        }
      } catch (e) {
        /* ignore */
      }
      /* Default: static lightweight UI. Re-enable motion: localStorage.setItem('alloc8-static-ui','0'); location.reload() */
      try {
        if (localStorage.getItem("alloc8-static-ui") === "0") {
          document.documentElement.removeAttribute("data-static-ui");
        } else {
          document.documentElement.setAttribute("data-static-ui", "1");
        }
      } catch (e) {
        document.documentElement.setAttribute("data-static-ui", "1");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1117" />
    <title>Alloc8 — Workforce allocation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
